version: '3'

services:
  chamapp-db:
    image: postgres:15-alpine
    container_name: chamapp-db
    ports:
      - '5432:5432'
    environment:
      - POSTGRES_USER=docker
      - POSTGRES_PASSWORD=docker
      - POSTGRES_DB=chamapp
    volumes:
      - chamapp_pg_data:/var/lib/postgresql/data

volumes:
  chamapp_pg_data:
